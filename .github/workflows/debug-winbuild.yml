# TEMPORARY: Windows build + list the VST3/CLAP/Standalone artefact tree so we
# can fix the Inno installer's hardcoded source paths. Delete once resolved.
name: debug-winbuild

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false }

      - name: Check out pewpew at latest branch
        uses: ./.github/actions/checkout-plugin
        with:
          plugin: pewpew
          repo: noahbaxter/pewpew
          branch: main
          token: ${{ secrets.PLUGINS_CI_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }

      - name: Build web UI
        uses: ./.github/actions/build-web
        with:
          web-dir: plugins/pewpew/web
          uses-webplug-ui: 'true'
          token: ${{ secrets.PLUGINS_CI_TOKEN }}

      - name: Configure + build (Release)
        shell: bash
        run: |
          cmake -B plugins/pewpew/build -S plugins/pewpew -G "Visual Studio 17 2022" -A x64
          cmake --build plugins/pewpew/build --config Release --parallel

      - name: List artefact tree
        shell: bash
        run: |
          set +e
          echo "=== everything named PewPew.vst3 / .clap / .exe under build ==="
          find plugins/pewpew/build -iname 'PewPew.vst3' -o -iname 'PewPew.clap' -o -iname 'PewPew.exe' 2>/dev/null
          echo ""
          echo "=== PewPew_artefacts tree (dirs + leaf files, 4 levels) ==="
          find plugins/pewpew/build/PewPew_artefacts -maxdepth 6 2>/dev/null | grep -iE 'vst3|clap|standalone|\.exe|\.dll|x86_64|Contents|Release' | head -60
          echo ""
          echo "=== CLAP artefacts (separate target) ==="
          find plugins/pewpew/build -ipath '*_CLAP*' -iname '*.clap' 2>/dev/null
