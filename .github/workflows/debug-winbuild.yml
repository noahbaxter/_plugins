# TEMPORARY: Windows build + list the VST3/CLAP/Standalone artefact tree so we
# can fix the Inno installer's hardcoded source paths. Delete once resolved.
name: debug-winbuild

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false }

      - name: Check out pewpew at latest branch
        uses: ./.github/actions/checkout-plugin
        with:
          plugin: pewpew
          repo: noahbaxter/pewpew
          branch: main
          token: ${{ secrets.PLUGINS_CI_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }

      - name: Build web UI
        uses: ./.github/actions/build-web
        with:
          web-dir: plugins/pewpew/web
          uses-webplug-ui: 'true'
          token: ${{ secrets.PLUGINS_CI_TOKEN }}

      - name: Configure + build (Release)
        shell: bash
        run: |
          cmake -B plugins/pewpew/build -S plugins/pewpew -G "Visual Studio 17 2022" -A x64
          cmake --build plugins/pewpew/build --config Release --parallel

      - name: Build Inno installer (mirror release.yml)
        shell: pwsh
        env:
          PLUGIN: pewpew
          ISS: scripts/installer/windows/installer.iss
          VERSION: 0.7.0
        run: |
          choco install innosetup -y
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          $issPath = "plugins/$env:PLUGIN/$env:ISS"
          $issDir = Split-Path $issPath
          Push-Location $issDir
          & $iscc /DVERSION=$env:VERSION (Split-Path $issPath -Leaf)
          Pop-Location
          New-Item -ItemType Directory -Force -Path installer-out | Out-Null
          Get-ChildItem -Path $issDir -Filter *.exe | Copy-Item -Destination installer-out
          Write-Host "=== installer-out ==="
          Get-ChildItem installer-out | Format-Table Name, Length
