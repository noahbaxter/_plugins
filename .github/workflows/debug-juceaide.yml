# TEMPORARY debug workflow: isolate the juceaide binarydata crash on Windows.
# Mirrors build-windows up through cmake configure (which generates juceaide.exe
# and the binarydata input_file_list), then runs juceaide binarydata MANUALLY:
#   1. per-file  - each source alone, to find a per-file size threshold / culprit
#   2. cumulative - growing batches, to find a total-size threshold
# It never builds the full plugin, never signs, never uploads. Delete after use.
name: debug-juceaide

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with: { submodules: false }

      - name: Check out pewpew at latest branch
        uses: ./.github/actions/checkout-plugin
        with:
          plugin: pewpew
          repo: noahbaxter/pewpew
          branch: main
          token: ${{ secrets.PLUGINS_CI_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }

      - name: Build web UI
        uses: ./.github/actions/build-web
        with:
          web-dir: plugins/pewpew/web
          uses-webplug-ui: 'true'
          token: ${{ secrets.PLUGINS_CI_TOKEN }}

      - name: Configure only (generates juceaide + input_file_list)
        shell: bash
        run: |
          set -euo pipefail
          cmake -B plugins/pewpew/build -S plugins/pewpew -G "Visual Studio 17 2022" -A x64

      - name: Probe juceaide binarydata
        shell: bash
        run: |
          set +e
          BUILD=plugins/pewpew/build
          JA=$(find "$BUILD" -iname 'juceaide.exe' | head -1)
          IFL=$(find "$BUILD" -ipath '*juce_binarydata_PewPewData*' -name 'input_file_list' | head -1)
          echo "juceaide = $JA"
          echo "list     = $IFL"
          echo "=== juceaide version ==="
          "$JA" version </dev/null

          # Read the list into an array so the loop never shares stdin with juceaide.
          mapfile -t FILES < <(grep . "$IFL")
          echo "=== ${#FILES[@]} files ==="

          run() { # run() <outdir> <listfile>  -> echoes rc, immune to crash/hang
            timeout 180 "$JA" binarydata BinaryData BinaryData.h "$1" "$2" </dev/null >"$1.log" 2>&1
            echo $?
          }

          echo ""
          echo "=== PER-FILE (each source alone) ==="
          i=0
          for f in "${FILES[@]}"; do
            i=$((i+1))
            sz=$(wc -c < "$f" 2>/dev/null | tr -d ' ')
            printf '%s\n' "$f" > "one_$i.txt"; rm -rf "out_$i"; mkdir -p "out_$i"
            echo "-> [$i] START size=$sz $f"
            rc=$(run "out_$i" "one_$i.txt")
            echo "<- [$i] rc=$rc  :: $(tr '\n' ' ' < out_$i.log | head -c 300)"
          done

          echo ""
          echo "=== CUMULATIVE (first k sources, growing) ==="
          n=${#FILES[@]}
          for k in $(seq 1 "$n"); do
            printf '%s\n' "${FILES[@]:0:$k}" > "batch_$k.txt"; rm -rf "bout_$k"; mkdir -p "bout_$k"
            tot=$(printf '%s\n' "${FILES[@]:0:$k}" | while IFS= read -r f; do wc -c < "$f"; done | awk '{s+=$1} END{print s}')
            last="${FILES[$((k-1))]}"
            echo "-> k=$k cumbytes=$tot (+$last)"
            rc=$(run "bout_$k" "batch_$k.txt")
            echo "<- k=$k rc=$rc :: $(tr '\n' ' ' < bout_$k.log | head -c 300)"
          done
          echo "=== done ==="
          exit 0
