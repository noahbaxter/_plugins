name: Check out plugin at latest branch
description: >
  Clone the selected plugin submodule at its latest branch tip (and its nested
  submodules) using PLUGINS_CI_TOKEN for private-repo access. Pulls Git LFS too.

inputs:
  plugin:
    description: Plugin name (submodule dir under plugins/)
    required: true
  repo:
    description: owner/repo of the plugin (for error messages)
    required: true
  branch:
    description: Branch to track
    required: true
    default: main
  token:
    description: PLUGINS_CI_TOKEN (Contents:Read on all plugin repos + webplug-ui)
    required: true

runs:
  using: composite
  steps:
    # One step so GH_TOKEN is in scope for both the access probe and every git
    # call. We use `gh auth setup-git` (not a hand-built x-access-token URL): that
    # form is for GitHub App tokens like the built-in GITHUB_TOKEN, and a
    # fine-grained PAT rejects it with a misleading "Repository not found" even
    # though the same token reads fine via the REST API. gh picks the right
    # credential for whatever token type PLUGINS_CI_TOKEN is.
    - name: Check out plugin at latest branch
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        PLUGIN: ${{ inputs.plugin }}
        REPO: ${{ inputs.repo }}
      run: |
        set -euo pipefail
        if [ -z "${GH_TOKEN:-}" ]; then
          echo "::error::PLUGINS_CI_TOKEN is empty — cannot check out ${REPO}"
          exit 1
        fi
        # Fail fast with a clear error if the token can't read the plugin repo.
        # A 404 here means the token's Repository access does not include this repo
        # (add it + Contents: Read) — see README troubleshooting.
        if ! gh api "repos/${REPO}" --jq .full_name >/dev/null 2>err.txt; then
          echo "::error::PLUGINS_CI_TOKEN cannot read ${REPO} (add this repo to the token's Repository access + Contents: Read):"
          cat err.txt
          exit 1
        fi
        # Make git use gh's credential for github.com, then also rewrite ssh forms
        # to https so any ssh-pinned submodule URL clones over the authed https path.
        gh auth setup-git
        for prefix in "git@github.com:" "git+ssh://git@github.com/" "ssh://git@github.com/"; do
          git config --global url."https://github.com/".insteadOf "$prefix"
        done
        # --remote (no --recursive) moves ONLY the plugin submodule to its branch
        # tip; then a plain recursive update checks out the plugin's OWN pinned
        # nested submodules (e.g. JUCE at the commit the plugin records, not
        # JUCE's branch tip). --remote --recursive would wrongly bump those pins.
        git submodule update --remote --init "plugins/$PLUGIN"
        git -C "plugins/$PLUGIN" submodule update --init --recursive
        # Pull LFS content (e.g. baked sprite PNGs) inside the plugin checkout.
        git -C "plugins/$PLUGIN" lfs install --local >/dev/null 2>&1 || true
        git -C "plugins/$PLUGIN" lfs pull >/dev/null 2>&1 || true
        echo "checked out plugins/$PLUGIN @ $(git -C "plugins/$PLUGIN" rev-parse --short HEAD)"
