name: Build web UI
description: >
  Build a plugin's WebView UI with bun. If the plugin depends on the private
  webplug-ui package, rewrite its git URL to authenticated HTTPS first (with a
  fail-fast access probe) so `bun install` can clone it.

inputs:
  web-dir:
    description: Path to the plugin's web/ directory
    required: true
  uses-webplug-ui:
    description: "'true' if the plugin depends on the private webplug-ui package"
    required: true
    default: "false"
  token:
    description: PLUGINS_CI_TOKEN (needs webplug-ui in its Repository access)
    required: true

runs:
  using: composite
  steps:
    - name: Authenticate to private webplug-ui
      if: inputs.uses-webplug-ui == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail
        if [ -z "${GH_TOKEN:-}" ]; then
          echo "::error::PLUGINS_CI_TOKEN empty — cannot fetch private webplug-ui"
          exit 1
        fi
        if ! gh api "repos/noahbaxter/webplug-ui" --jq .full_name >/dev/null 2>err.txt; then
          echo "::error::PLUGINS_CI_TOKEN cannot read noahbaxter/webplug-ui (add it to the token's Repository access + Contents: Read):"
          cat err.txt
          exit 1
        fi
        # Make git use gh's credential for github.com (correct for a fine-grained
        # PAT — the x-access-token URL form is app-token-only), and rewrite the
        # git+ssh URL webplug-ui is pinned as to https so bun clones it over auth.
        gh auth setup-git
        for prefix in "git+ssh://git@github.com/" "ssh://git@github.com/" "git@github.com:"; do
          git config --global url."https://github.com/".insteadOf "$prefix"
        done
        echo "webplug-ui access OK"

    - name: bun install + build
      shell: bash
      working-directory: ${{ inputs.web-dir }}
      env:
        # gh's git credential helper reads GH_TOKEN at fetch time; bun shells out
        # to git to clone webplug-ui, so the token must be present in this step too.
        GH_TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail
        bun install --frozen-lockfile
        bun run build
